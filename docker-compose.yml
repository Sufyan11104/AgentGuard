services:
  postgres:
    image: postgres:16-alpine
    container_name: agentguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentguard}
      POSTGRES_DB: ${POSTGRES_DB:-agentguard}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - agentguard_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentguard} -d ${POSTGRES_DB:-agentguard}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  agentguard_postgres_data:
